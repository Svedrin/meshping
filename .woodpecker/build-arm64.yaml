when:
  - event: push
    branch:
      include: [master, staging]
  - event: tag

labels:
  arch: arm64

depends_on: [tests]

steps:
  - name: build latest
    image: woodpeckerci/plugin-kaniko
    settings:
      username: svedrin
      password:
        from_secret: docker-registry-pw
      repo: svedrin/meshping
      tags: latest-arm64
      cache: true
      registry: index.docker.io
      cache_repo: svedrin/meshping
    when:
      - event: push
        branch: master

  - name: build staging
    image: woodpeckerci/plugin-kaniko
    settings:
      username: svedrin
      password:
        from_secret: docker-registry-pw
      repo: svedrin/meshping
      tags: staging-arm64
      cache: true
      registry: index.docker.io
      cache_repo: svedrin/meshping
    when:
      - event: push
        branch: staging

  - name: build tagged
    image: woodpeckerci/plugin-kaniko
    settings:
      username: svedrin
      password:
        from_secret: docker-registry-pw
      repo: svedrin/meshping
      tags: ${CI_COMMIT_TAG}-arm64
      cache: true
      registry: index.docker.io
      cache_repo: svedrin/meshping
    when:
      - event: tag
